name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  engine:
    name: Python engine
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install engine
        run: python -m pip install -e 'engine[dev,server]'

      - name: Run engine tests
        working-directory: engine
        run: python -m pytest
