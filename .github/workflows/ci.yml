name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  engine:
    name: Python engine
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install engine
        run: python -m pip install -e 'engine[dev,server,scanner]'

      - name: Install browser for scanner tests
        run: python -m playwright install --with-deps chromium

      - name: Run engine tests
        working-directory: engine
        run: python -m pytest

  java-sdk:
    name: Java SDK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Java SDK tests
        run: mvn -f sdk-java/pom.xml test

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: sdk-typescript/package-lock.json

      - name: Install TypeScript SDK dependencies
        working-directory: sdk-typescript
        run: npm ci

      - name: Run TypeScript SDK tests
        working-directory: sdk-typescript
        run: npm test
